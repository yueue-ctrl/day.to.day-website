        <div class="split right">

                    <div class="pay-options">
                        <span class="option title">for pay</span>
                        <div class="option-item has-submenu" id="pay-type">
                            <div class="main-label">

                            </div>
                            <div class="expanded-menu">
                                <span class="zh sub-item">交互</span>
                                <span class="zh sub-item">编排</span>
                                <span class="zh sub-item">图形</span>
                                <span class="zh main-item">按方法</span>
                                <span class="en main-item">by approach</span>

            </div>
        </div>

    <script>
        const blade = document.getElementById('windmillBlade');
        
        const centerPanel = document.getElementById('centerPanel');

        // Physics variables
        let rotation = 0;
        let velocity = 0;
        let lastMouseAngle = 0;
        let lastTime = 0;
        const friction = 0.98; // Air resistance (0-1)
        const sensitivity = 0.15; // How much mouse movement affects velocity
        let isHovering = false; // Flag to track hover state

        // Windmill hover interaction
        blade.parentElement.addEventListener('mouseenter', () => {
            isHovering = true;
            velocity = 0; // Stop velocity immediately
            
            // Calculate target rotation (nearest 0)
            let currentRotation = rotation % 360;
            // Normalize to -180 to 180
            if (currentRotation > 180) currentRotation -= 360;
            if (currentRotation < -180) currentRotation += 360;
            
            // We want to animate back to 0 (or nearest multiple of 360)
            // But simply setting rotation to 0 might cause a jump if we are at 350 deg (should go to 360/0)
            // So we animate 'rotation' to 'rotation - currentRotation'
            
            const targetRotation = rotation - currentRotation;
            
            // Smoothly animate to target using a separate animation loop or modifying the update loop
            // Let's modify the update loop to handle 'resetting' state
        });

        blade.parentElement.addEventListener('mouseleave', () => {
            isHovering = false;
        });

        // Windmill click interaction
        blade.parentElement.addEventListener('click', () => {
            // If in left-focus mode, reset to original
            if (document.body.classList.contains('left-focus')) {
                document.body.classList.remove('left-focus');
                return;
            }
            
            // If in right-focus mode, reset to original
            if (document.body.classList.contains('right-focus')) {
                document.body.classList.remove('right-focus');
                return;
            }

            centerPanel.classList.toggle('expanded');
            document.body.classList.toggle('panel-open'); // Toggle body class for side layout adjustments
        });
        
        // "在玩" (Play) click interaction
        const playTitle = document.querySelector('.split.left h1');
        playTitle.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent bubbling
            
            // If panel is open, close it first? Or just transition?
            // Let's close the panel if it's open to avoid conflicts
            if (document.body.classList.contains('panel-open')) {
                centerPanel.classList.remove('expanded');
                document.body.classList.remove('panel-open');
            }

            document.body.classList.add('left-focus');
        });

        // "在忙" (Pay) click interaction
        // Use ID or more specific selector to be safe
        const payTitle = document.querySelector('.split.right h1');
        if (payTitle) {
            payTitle.addEventListener('click', (e) => {
                console.log('Pay clicked'); // Debug
                e.stopPropagation(); // Prevent bubbling
                
                // If panel is open, close it first
                if (document.body.classList.contains('panel-open')) {
                    centerPanel.classList.remove('expanded');
                    document.body.classList.remove('panel-open');
                }

                // If left focus is active, remove it
                if (document.body.classList.contains('left-focus')) {
                    document.body.classList.remove('left-focus');
                }

                document.body.classList.add('right-focus');
            });
        }
        
        function getAngle(x, y) {
            const rect = blade.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const angleRad = Math.atan2(y - centerY, x - centerX);
            return angleRad * (180 / Math.PI);
        }

        document.addEventListener('mousemove', (e) => {
            if (!blade || isHovering) return; // Don't rotate if hovering
            
            const currentAngle = getAngle(e.clientX, e.clientY);
            
            // Calculate angle difference accounting for wrap-around
            let delta = currentAngle - lastMouseAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            
            // Add impulse to velocity based on mouse movement speed
            velocity += delta * sensitivity;
            
            lastMouseAngle = currentAngle;
        });

        // Animation loop
        function update(time) {
            if (!lastTime) lastTime = time;
            
            if (!isHovering) {
                // Apply velocity
                rotation += velocity;
                // Apply friction
                velocity *= friction;
                
                // Stop if velocity is very small
                if (Math.abs(velocity) < 0.01) velocity = 0;
            } else {
                // Smoothly reset to 0 (or nearest 360 multiple) when hovering
                // Find nearest multiple of 360
                const targetRotation = Math.round(rotation / 360) * 360;
                // Lerp towards it
                rotation += (targetRotation - rotation) * 0.1;
            }
            
            if (blade) {
                blade.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            }
            
            requestAnimationFrame(update);
        }
        
        requestAnimationFrame(update);
    </script>
</body>
